<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a2e">Shop Easy — E-Commerce Microservices Architecture</text>
  
  <!-- Developer Section -->
  <rect x="30" y="70" width="200" height="120" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="130" y="100" text-anchor="middle" font-size="12" fill="#6b7280">DEVELOPER</text>
  <text x="130" y="130" text-anchor="middle" font-size="28">👨‍💻</text>
  <text x="130" y="155" text-anchor="middle" font-size="11" fill="#374151">git push to main</text>
  <text x="130" y="175" text-anchor="middle" font-size="11" fill="#374151">branch</text>
  
  <!-- Arrow from Dev to GitHub -->
  <line x1="230" y1="130" x2="290" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- GitHub Actions -->
  <rect x="290" y="70" width="200" height="120" rx="10" fill="#ffffff" stroke="#24292f" stroke-width="2"/>
  <text x="390" y="95" text-anchor="middle" font-size="12" fill="#6b7280">CI/CD</text>
  <circle cx="390" cy="125" r="20" fill="#24292f"/>
  <text x="390" y="132" text-anchor="middle" font-size="18" fill="white">⚡</text>
  <text x="390" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#24292f">GitHub Actions</text>
  <text x="390" y="175" text-anchor="middle" font-size="10" fill="#6b7280">Build → Push → Deploy</text>
  
  <!-- Arrow from GitHub to ECR -->
  <line x1="490" y1="130" x2="550" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- ECR -->
  <rect x="550" y="70" width="180" height="120" rx="10" fill="#ffffff" stroke="#ff9900" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-size="12" fill="#ff9900">CONTAINER REGISTRY</text>
  <rect x="610" y="105" width="60" height="40" rx="5" fill="#ff9900"/>
  <text x="640" y="130" text-anchor="middle" font-size="16" fill="white">📦</text>
  <text x="640" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#232f3e">Amazon ECR</text>
  <text x="640" y="175" text-anchor="middle" font-size="10" fill="#6b7280">5 Docker Images</text>
  
  <!-- AWS Cloud Boundary -->
  <rect x="50" y="220" width="1100" height="550" rx="15" fill="none" stroke="#ff9900" stroke-width="3" stroke-dasharray="10,5"/>
  <rect x="65" y="210" width="120" height="25" fill="#f8fafc"/>
  <text x="125" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#ff9900">☁️ AWS Cloud</text>
  
  <!-- VPC Boundary -->
  <rect x="80" y="250" width="1050" height="500" rx="12" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="130" y="270" font-size="12" font-weight="bold" fill="#0ea5e9">VPC 10.0.0.0/16</text>
  
  <!-- Public Subnets -->
  <rect x="100" y="285" width="480" height="130" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="120" y="305" font-size="11" font-weight="bold" fill="#10b981">Public Subnets (10.0.1.0/24, 10.0.2.0/24)</text>
  
  <!-- Internet -->
  <rect x="820" y="75" width="140" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="890" y="110" text-anchor="middle" font-size="28">🌐</text>
  <text x="890" y="140" text-anchor="middle" font-size="12" fill="#374151">Internet / Users</text>
  
  <!-- Arrow from Internet to ALB -->
  <line x1="890" y1="155" x2="890" y2="215" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="890" y1="215" x2="340" y2="310" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- ALB -->
  <rect x="160" y="315" width="360" height="80" rx="8" fill="#ffffff" stroke="#ff9900" stroke-width="2"/>
  <text x="240" y="345" font-size="11" fill="#ff9900">APPLICATION LOAD BALANCER</text>
  <text x="200" y="375" font-size="22">⚖️</text>
  <text x="280" y="375" font-size="13" font-weight="bold" fill="#232f3e">shop-easy-alb</text>
  <text x="280" y="392" font-size="10" fill="#6b7280">Port 80 → Routes by path</text>
  <text x="430" y="345" font-size="9" fill="#6b7280">/products* → Product TG</text>
  <text x="430" y="358" font-size="9" fill="#6b7280">/cart* → Cart TG</text>
  <text x="430" y="371" font-size="9" fill="#6b7280">/orders* → Order TG</text>
  <text x="430" y="384" font-size="9" fill="#6b7280">/payments* → Payment TG</text>
  
  <!-- NAT Gateway -->
  <rect x="600" y="310" width="130" height="70" rx="8" fill="#ffffff" stroke="#ff9900" stroke-width="2"/>
  <text x="665" y="335" text-anchor="middle" font-size="11" fill="#ff9900">NAT Gateway</text>
  <text x="665" y="365" text-anchor="middle" font-size="20">🔀</text>
  
  <!-- Private Subnets -->
  <rect x="100" y="430" width="700" height="300" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="450" font-size="11" font-weight="bold" fill="#f59e0b">Private Subnets (10.0.10.0/24, 10.0.11.0/24)</text>
  
  <!-- ECS Cluster Box -->
  <rect x="120" y="460" width="520" height="250" rx="8" fill="#ffffff" stroke="#ff9900" stroke-width="2"/>
  <text x="140" y="480" font-size="12" font-weight="bold" fill="#ff9900">🐳 ECS Fargate Cluster</text>
  
  <!-- Product Service -->
  <rect x="140" y="495" width="150" height="65" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="515" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Product Service</text>
  <text x="215" y="532" text-anchor="middle" font-size="10" fill="#6b7280">Node.js :4001</text>
  <text x="215" y="548" text-anchor="middle" font-size="9" fill="#6b7280">CRUD products</text>
  
  <!-- Cart Service -->
  <rect x="310" y="495" width="150" height="65" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="385" y="515" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Cart Service</text>
  <text x="385" y="532" text-anchor="middle" font-size="10" fill="#6b7280">Node.js :4002</text>
  <text x="385" y="548" text-anchor="middle" font-size="9" fill="#6b7280">Add/remove items</text>
  
  <!-- Order Service -->
  <rect x="480" y="495" width="150" height="65" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="555" y="515" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Order Service</text>
  <text x="555" y="532" text-anchor="middle" font-size="10" fill="#6b7280">Node.js :4003</text>
  <text x="555" y="548" text-anchor="middle" font-size="9" fill="#6b7280">Checkout flow</text>
  
  <!-- Payment Service -->
  <rect x="140" y="575" width="150" height="65" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="595" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Payment Service</text>
  <text x="215" y="612" text-anchor="middle" font-size="10" fill="#6b7280">Node.js :4004</text>
  <text x="215" y="628" text-anchor="middle" font-size="9" fill="#6b7280">Process payments</text>
  
  <!-- Frontend Service -->
  <rect x="310" y="575" width="150" height="65" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="385" y="595" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Frontend</text>
  <text x="385" y="612" text-anchor="middle" font-size="10" fill="#6b7280">React + Nginx :80</text>
  <text x="385" y="628" text-anchor="middle" font-size="9" fill="#6b7280">SPA UI</text>
  
  <!-- CloudWatch -->
  <rect x="480" y="575" width="150" height="65" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="555" y="595" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">CloudWatch</text>
  <text x="555" y="612" text-anchor="middle" font-size="10" fill="#6b7280">Logs & Monitoring</text>
  <text x="555" y="628" text-anchor="middle" font-size="9" fill="#6b7280">/ecs/shop-easy</text>
  
  <!-- RDS -->
  <rect x="830" y="480" width="200" height="180" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="930" y="510" text-anchor="middle" font-size="12" fill="#3b82f6">DATABASE</text>
  <rect x="895" y="520" width="70" height="50" rx="8" fill="#3b82f6"/>
  <text x="930" y="552" text-anchor="middle" font-size="22" fill="white">🗄️</text>
  <text x="930" y="590" text-anchor="middle" font-size="13" font-weight="bold" fill="#232f3e">Amazon RDS</text>
  <text x="930" y="608" text-anchor="middle" font-size="11" fill="#6b7280">MySQL 8.0</text>
  <text x="930" y="625" text-anchor="middle" font-size="10" fill="#6b7280">db.t3.micro</text>
  <text x="930" y="645" text-anchor="middle" font-size="9" fill="#6b7280">products, users, orders</text>

  <!-- Arrows from ALB to services -->
  <line x1="340" y1="395" x2="215" y2="495" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="340" y1="395" x2="385" y2="495" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="340" y1="395" x2="555" y2="495" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="340" y1="395" x2="385" y2="575" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  
  <!-- Arrows from services to RDS -->
  <line x1="290" y1="530" x2="830" y2="560" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
  <line x1="460" y1="530" x2="830" y2="570" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
  <line x1="630" y1="530" x2="830" y2="580" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
  <line x1="290" y1="610" x2="830" y2="590" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <!-- ECR to ECS arrow -->
  <line x1="640" y1="190" x2="380" y2="460" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="540" y="310" font-size="9" fill="#ff9900" transform="rotate(-35, 540, 310)">pull images</text>

  <!-- Legend -->
  <rect x="820" y="280" width="300" height="165" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="305" font-size="12" font-weight="bold" fill="#374151">Tech Stack</text>
  <text x="840" y="328" font-size="10" fill="#6b7280">🐳 Docker — Containerization</text>
  <text x="840" y="348" font-size="10" fill="#6b7280">⚡ GitHub Actions — CI/CD Pipeline</text>
  <text x="840" y="368" font-size="10" fill="#6b7280">🏗️ Terraform — Infrastructure as Code</text>
  <text x="840" y="388" font-size="10" fill="#6b7280">⚛️ React — Frontend SPA</text>
  <text x="840" y="408" font-size="10" fill="#6b7280">📗 Node.js + Express — Backend APIs</text>
  <text x="840" y="428" font-size="10" fill="#6b7280">🗄️ MySQL 8.0 — Relational Database</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9900"/>
    </marker>
  </defs>
</svg>
